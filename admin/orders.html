<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng - Admin SHOPACCGAME.VN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../common/vendor/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <div class="admin-shell">
        <div id="admin-sidebar-mount"></div>

        <main class="admin-main">
            <div class="admin-topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="admin-toggle-btn" id="admin-toggle-btn"><i class="fa-solid fa-bars"></i></button>
                    <div>
                        <h1>Quản lý đơn hàng</h1>
                        <p>Xem, đổi trạng thái và xoá đơn hàng</p>
                    </div>
                </div>
                <button class="btn btn-outline-primary btn-sm" id="seed-demo-btn"><i class="fa-solid fa-wand-magic-sparkles me-1"></i>Tạo dữ liệu demo</button>
            </div>

            <div class="admin-panel">
                <div class="admin-toolbar">
                    <input type="text" id="search-input" class="form-control" style="max-width:280px" placeholder="Tìm theo mã đơn, khách hàng, sản phẩm...">
                    <select id="status-filter" class="form-select" style="max-width:180px">
                        <option value="">Tất cả trạng thái</option>
                        <option value="Hoàn tất">Hoàn tất</option>
                        <option value="Đang xử lý">Đang xử lý</option>
                        <option value="Đã huỷ">Đã huỷ</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Sản phẩm</th>
                                <th>Giá</th>
                                <th>Ngày</th>
                                <th>Tài khoản acc</th>
                                <th>Trạng thái</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="orders-rows"></tbody>
                    </table>
                    <div class="admin-empty d-none" id="orders-empty">
                        <i class="fa-solid fa-inbox"></i>
                        Chưa có đơn hàng nào khớp điều kiện lọc.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../common/vendor/jquery.min.js"></script>
    <script src="../common/vendor/bootstrap.bundle.min.js"></script>
    <script src="../common/js/script.js"></script>
    <script src="admin.js"></script>
    <script>
$(function () {
    initAdminLayout('orders');
    renderOrdersTable();

    $('#seed-demo-btn').on('click', function () {
        seedDemoData();
        showToast('Đã tạo dữ liệu demo!');
        renderOrdersTable();
    });

    $('#search-input').on('input', renderOrdersTable);
    $('#status-filter').on('change', renderOrdersTable);
});

function statusToClass(status) {
    if (status === 'Hoàn tất') return 'status-hoan-tat';
    if (status === 'Đang xử lý') return 'status-dang-xu-ly';
    if (status === 'Đã huỷ') return 'status-da-huy';
    return '';
}

function renderOrdersTable() {
    const keyword = $('#search-input').val().trim().toLowerCase();
    const statusFilter = $('#status-filter').val();

    let orders = getOrders().slice().reverse();

    if (keyword) {
        orders = orders.filter(function (o) {
            return (o.id || '').toLowerCase().includes(keyword)
                || (o.buyerName || '').toLowerCase().includes(keyword)
                || (o.buyerEmail || '').toLowerCase().includes(keyword)
                || (o.productName || '').toLowerCase().includes(keyword);
        });
    }
    if (statusFilter) {
        orders = orders.filter(o => o.status === statusFilter);
    }

    const $rows = $('#orders-rows');
    const $empty = $('#orders-empty');
    $rows.empty();

    if (!orders.length) {
        $empty.removeClass('d-none');
        return;
    }
    $empty.addClass('d-none');

    orders.forEach(function (o) {
        const $tr = $(`
        <tr data-id="${escapeHtmlAdmin(o.id)}">
            <td class="admin-badge">${escapeHtmlAdmin(o.id)}</td>
            <td>
                <div>${escapeHtmlAdmin(o.buyerName || '—')}</div>
                <div style="color:var(--text-mute); font-size:0.78rem;">${escapeHtmlAdmin(o.buyerEmail || '')}</div>
            </td>
            <td>${escapeHtmlAdmin(o.productName)}</td>
            <td>${formatVNDAdmin(o.price)}</td>
            <td>${escapeHtmlAdmin(o.date)}</td>
            <td style="font-family:var(--font-mono); font-size:0.8rem;">${escapeHtmlAdmin(o.account || '—')}</td>
            <td>
                <select class="status-select ${statusToClass(o.status)}">
                    <option value="Hoàn tất" ${o.status === 'Hoàn tất' ? 'selected' : ''}>Hoàn tất</option>
                    <option value="Đang xử lý" ${o.status === 'Đang xử lý' ? 'selected' : ''}>Đang xử lý</option>
                    <option value="Đã huỷ" ${o.status === 'Đã huỷ' ? 'selected' : ''}>Đã huỷ</option>
                </select>
            </td>
            <td><button type="button" class="admin-icon-btn delete-order-btn" title="Xoá đơn"><i class="fa-solid fa-trash"></i></button></td>
        </tr>`);
        $rows.append($tr);
    });

    $rows.find('.status-select').on('change', function () {
        const id = $(this).closest('tr').data('id');
        const newStatus = $(this).val();
        const orders = getOrders();
        const idx = orders.findIndex(o => o.id === id);
        if (idx !== -1) {
            orders[idx].status = newStatus;
            saveOrders(orders);
            showToast('Đã cập nhật trạng thái đơn ' + id);
        }
        $(this).attr('class', 'status-select ' + statusToClass(newStatus));
    });

    $rows.find('.delete-order-btn').on('click', function () {
        const id = $(this).closest('tr').data('id');
        if (!window.confirm('Xoá đơn hàng ' + id + '? Hành động này không thể hoàn tác.')) return;
        let orders = getOrders();
        orders = orders.filter(o => o.id !== id);
        saveOrders(orders);
        showToast('Đã xoá đơn ' + id);
        renderOrdersTable();
    });
}
    </script>
</body>
</html>
