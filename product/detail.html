        <div class="container">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Trang chủ</a></li>

                    <li class="nav-item"><a class="nav-link" href="../history/index.html">Lịch sử mua nick</a></li>
                    <li class="nav-item"><a class="nav-link" href="../deposit/index.html">Nạp tiền</a></li>
                    <li class="nav-item"><a class="nav-link" href="../contact/index.html">Liên hệ</a></li>
                    <li class="nav-item" id="auth-link-container"><a class="nav-link" href="../auth/index.html" id="auth-link">Đăng nhập/Đăng ký</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5" style="margin-top:2rem;">
        <div class="container" id="detail-root">
            <!-- Nội dung được render bằng JS -->
        </div>
    </section>

    <section class="bg-panel py-5">
        <div class="container">
            <div class="section-title text-center">
                <span class="eyebrow">Có thể bạn quan tâm</span>
                <h2>Acc cùng danh mục</h2>
            </div>
            <div class="row" id="related-products"></div>
        </div>
    </section>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">© 2026 SHOPACCGAME.VN — Shop bán acc game uy tín</p>
        </div>
    </footer>

    <script src="../common/vendor/jquery.min.js"></script>
    <script src="../common/vendor/bootstrap.bundle.min.js"></script>
    <script src="../common/js/products.js"></script>
    <script src="../common/js/script.js"></script>
    <script>
$(function(){
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const product = getProductById(id);
    const $root = $('#detail-root');

    if (!product) {
        $root.html(`
            <div class="text-center py-5">
                <h2>Không tìm thấy tài khoản này</h2>
                <p style="color:var(--text-mute)">Acc có thể đã được bán hoặc gỡ khỏi hệ thống.</p>
                <a href="index.html" class="btn btn-primary mt-2">Về danh sách sản phẩm</a>
            </div>`);
        return;
    }

    $('#page-title').text(product.title + ' - SHOPACCGAME.VN');

    function priceRowHtml(){
        if (Number(product.price) === 0) {
            return `<span class="free-price" style="font-size:2rem;">Miễn phí</span><span class="price-old">${formatVND(product.oldPrice)}</span>`;
        }
        return `<span class="price-tag">${formatVND(product.price)}</span><span class="price-old">${formatVND(product.oldPrice)}</span>`;
    }

    if (product.isBlindBag) {
        // ============ GIAO DIỆN TÚI MÙ BÍ ẨN ============
        $root.html(`
            <div class="row g-5">
                <div class="col-lg-6">
                    <div class="detail-gallery hud-frame mystery-gallery zoomable-img">
                        <img src="${product.image}" alt="${product.title}">
                        <span class="mystery-badge"><i class="fa-solid fa-circle-question me-1"></i>Bí ẩn</span>
                    </div>
                </div>
                <div class="col-lg-6">
                    <span class="badge-game" style="position:static; display:inline-block; margin-bottom:0.8rem;">${product.game}</span>
                    <h1 style="font-size:2rem;">${product.title}</h1>
                    <p style="color:var(--text-mute)">Túi mù bí ẩn thuộc tựa game <b>${product.game}</b> — không biết trước bên trong có acc gì cho tới khi mở ra. Mỗi túi trả về ngẫu nhiên 1 tài khoản, hên xui may rủi, đảm bảo còn chơi được ngay sau khi nhận.</p>

                    <ul class="list-unstyled mt-3 mb-4">
                        <li class="mb-2"><i class="fa-solid fa-circle-check me-2" style="color:var(--cyan)"></i>Ngẫu nhiên 100% - chưa mở không biết trước bên trong</li>
                        <li class="mb-2"><i class="fa-solid fa-circle-check me-2" style="color:var(--cyan)"></i>Mã túi mù: <span class="mono-code">${product.code}</span></li>
                        <li class="mb-2"><i class="fa-solid fa-circle-check me-2" style="color:var(--cyan)"></i>Thuộc tựa game ${product.game}</li>
                        <li class="mb-2"><i class="fa-solid fa-circle-check me-2" style="color:var(--cyan)"></i>Bàn giao tài khoản ngay sau khi mua</li>
                        <li class="mb-2"><i class="fa-solid fa-circle-check me-2" style="color:var(--cyan)"></i>Bảo hành mất tài khoản 07 ngày</li>
                    </ul>

                    <div class="price-box mb-4">
                        <div class="d-flex align-items-baseline gap-2">
                            ${priceRowHtml()}
                        </div>
                        <div class="d-flex gap-3 mt-3 flex-wrap">
                            <button type="button" id="buy-now-btn" class="btn btn-primary flex-grow-1">Mua ngay</button>
                            <a href="https://zalo.me" target="_blank" rel="noopener" class="btn btn-outline-primary">Chat Zalo</a>
                        </div>
                    </div>

                    <table class="spec-table">
                        <tr><td>Mã túi mù</td><td>${product.code}</td></tr>
                        <tr><td>Tựa game</td><td>${product.game}</td></tr>
                        <tr><td>Nội dung bên trong</td><td>Ngẫu nhiên — chưa mở</td></tr>
                        <tr><td>Tình trạng</td><td>${product.status}</td></tr>
                        <tr><td>Bảo hành</td><td>7 ngày kể từ khi bàn giao</td></tr>
                    </table>
                </div>
            </div>`);
    } else {
        // ============ GIAO DIỆN ACC THƯỜNG ============
        $root.html(`
            <div class="row g-5">
                <div class="col-lg-6">
                    <div class="detail-gallery hud-frame zoomable-img">
                        <img src="${product.image}" alt="${product.title}">
                    </div>
                </div>
                <div class="col-lg-6">
                    <span class="badge-game" style="position:static; display:inline-block; margin-bottom:0.8rem;">${product.game}</span>
                    <h1 style="font-size:2rem;">${product.title}</h1>
                    <p style="color:var(--text-mute)">${product.description}</p>

                    <ul class="list-unstyled mt-3 mb-4">
                        ${product.highlights.map(h => `<li class="mb-2"><i class="fa-solid fa-circle-check me-2" style="color:var(--cyan)"></i>${h}</li>`).join('')}
                    </ul>

                    <div class="price-box mb-4">
                        <div class="d-flex align-items-baseline gap-2">
                            ${priceRowHtml()}
                        </div>
                        <div class="d-flex gap-3 mt-3 flex-wrap">
                            <button type="button" id="buy-now-btn" class="btn btn-primary flex-grow-1">Mua ngay</button>
                            <a href="https://zalo.me" target="_blank" rel="noopener" class="btn btn-outline-primary">Chat Zalo</a>
                        </div>
                    </div>

                    <table class="spec-table">
                        <tr><td>Rank hiện tại</td><td>${product.rank}</td></tr>
                        <tr><td>Cấp độ</td><td>${product.level}</td></tr>
                        <tr><td>Số tướng / nhân vật</td><td>${product.heroes || 'Đang cập nhật'}</td></tr>
                        <tr><td>Số trang phục / skin</td><td>${product.skins}</td></tr>
                        <tr><td>Tình trạng</td><td>${product.status}</td></tr>
                        <tr><td>Bảo hành</td><td>7 ngày kể từ khi bàn giao</td></tr>
                    </table>
                </div>
            </div>`);
    }

    const related = PRODUCTS.filter(p => p.game === product.game && p.id !== product.id);
    const fallback = related.length ? related : PRODUCTS.filter(p => p.id !== product.id).slice(0,3);
    renderProductCards('#related-products', fallback.slice(0,3), 'detail.html');

    $('#buy-now-btn').on('click', function(){
        handleBuyNow(product);
    });
});

/* Sinh chuỗi ngẫu nhiên gồm chữ và số, dùng làm tên tài khoản */
function randomAccountUsername(length){
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let out = '';
    for (let i = 0; i < length; i++){
        out += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return out;
}

/* Sinh chuỗi số ngẫu nhiên, dùng làm mật khẩu */
function randomPasswordDigits(length){
    let out = '';
    for (let i = 0; i < length; i++){
        out += Math.floor(Math.random() * 10);
    }
    return out;
}

/* Xử lý khi bấm "Mua ngay": kiểm tra số dư, trừ tiền, tạo tài khoản/mật khẩu,
   lưu vào lịch sử mua nick rồi chuyển hướng sang trang lịch sử.
   Acc 0 đồng luôn dùng chung 1 tài khoản/mật khẩu cố định và không trừ tiền. */
function handleBuyNow(product){
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    if (!isLoggedIn) {
        showToast('Vui lòng đăng nhập để mua acc.');
        setTimeout(function(){ window.location.href = '../auth/index.html'; }, 900);
        return;
    }

    const price = Number(product.price) || 0;
    let balance = Number(localStorage.getItem('userBalance')) || 0;

    if (price > 0 && balance < price) {
        showNoticeModal({
            type: 'warning',
            title: 'Số dư không đủ',
            message: 'Tài khoản của bạn không đủ số dư để mua acc này. Vui lòng nạp thêm tiền để tiếp tục.',
            buttonText: 'Nạp tiền ngay',
            onClose: function(){ window.location.href = '../deposit/index.html'; }
        });
        return;
    }

    const isFree = price === 0;
    const account = isFree ? 'khonglammadoicoan' : randomAccountUsername(8);
    const password = isFree ? 'thiandaubuoiancuc' : randomPasswordDigits(6);

    if (price > 0) {
        balance -= price;
        localStorage.setItem('userBalance', balance);

        // Đồng bộ số dư mới vào danh sách users để giữ khi đăng nhập lại
        const email = localStorage.getItem('userEmail');
        if (email) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            users = users.map(function(u){
                return u.email === email ? Object.assign({}, u, { balance: balance }) : u;
            });
            localStorage.setItem('users', JSON.stringify(users));
        }
    }

    const history = JSON.parse(localStorage.getItem('purchaseHistory')) || [];
    history.push({
        name: product.title + (product.code ? ' ' + product.code : ''),
        date: new Date().toLocaleDateString('vi-VN'),
        price: product.price,
        status: 'Hoàn tất',
        account: account,
        password: password
    });
    localStorage.setItem('purchaseHistory', JSON.stringify(history));

    // Ghi thêm vào danh sách đơn hàng dùng chung, để hiện trong trang
    // Quản lý đơn hàng của admin (admin/orders.html).
    pushAdminOrder({
        buyerEmail: localStorage.getItem('userEmail') || '',
        buyerName: localStorage.getItem('userName') || '',
        productName: product.title + (product.code ? ' ' + product.code : ''),
        price: product.price,
        date: new Date().toLocaleDateString('vi-VN'),
        status: 'Hoàn tất',
        account: account,
        password: password
    });

    window.location.href = '../history/index.html';
}
</script>

    </body>
</html>
